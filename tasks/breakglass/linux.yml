---
# Linux-specific tasks for ans_zeronetworks_misc_role
- name: Copy breakglass PowerShell script to Linux host.
  ansible.builtin.copy:
    src: breakglass.ps1
    dest: /tmp/breakglass.ps1
    mode: '0755'
    force: yes

- name: Run breakglass PowerShell script on Linux.
  ansible.builtin.shell: |
    pwsh -NoProfile -ExecutionPolicy Bypass -File /tmp/breakglass.ps1 \
      -targetNode "{{ targetNode }}" \
      -deploymentCluster "{{ deploymentCluster }}" \
      -Linux \
      -LinuxUseSSHKey \
      -LinuxSSHKeyPath "{{ ssh_key_path }}" \
      -mode "{{ mode }}"
  args:
    executable: /bin/bash
  register: output
  delegate_to: "{{ segmentServer }}"

- name: Print output
  ansible.builtin.debug:
    msg: "{{ output.stdout_lines }}"
